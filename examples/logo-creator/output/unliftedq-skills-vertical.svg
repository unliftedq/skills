<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    UnliftedQ Skills — Vertical (Stacked) Lockup
    Icon above (240×240, centered), "SKILLS" wordmark below (centered).
    viewBox: 512×512 (square).
    Icon scaled 0.46875 from 512-base mark. Gap ~50px between icon and text.
    Wordmark: geometric block sans, outlined paths, 12px stroke, 72px cap height.
  -->

  <!-- === Icon (240×240, centered at x=136, y=51) === -->
  <!-- Top-left block (wide) -->
  <rect x="158.5" y="73.5" width="110" height="92" fill="#E8553A"/>
  <!-- Top-right block (narrow) -->
  <rect x="280" y="73.5" width="73.5" height="92" fill="#2EC4B6"/>
  <!-- Bottom-left block (narrow) -->
  <rect x="158.5" y="177" width="73.5" height="92" fill="#5B5FE5"/>
  <!-- Bottom-right block (wide) -->
  <rect x="243.5" y="177" width="110" height="92" fill="#F4B942"/>

  <defs>
    <linearGradient id="wm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8553A"/>
      <stop offset="33%" stop-color="#5B5FE5"/>
      <stop offset="66%" stop-color="#2EC4B6"/>
      <stop offset="100%" stop-color="#F4B942"/>
    </linearGradient>
  </defs>

  <!-- === Wordmark "SKILLS" centered at y=341, x=123 === -->
  <path fill-rule="evenodd" fill="url(#wm-grad)" d="
    M123,341 H165 V413 H123 Z
    M135,353 V371 H165 V353 Z
    M123,383 V401 H153 V383 Z

    M173,341 H185 V413 H173 Z
    M185,371 L223,341 L223,353 L185,383 Z
    M185,371 L185,383 L223,401 L223,413 Z

    M231,341 H243 V413 H231 Z

    M251,341 H263 V401 H291 V413 H251 Z

    M299,341 H311 V401 H339 V413 H299 Z

    M347,341 H389 V413 H347 Z
    M359,353 V371 H389 V353 Z
    M347,383 V401 H377 V383 Z
  "/>
</svg>
